<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - FurtherWind</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">FurtherWind - Админ</div>
            <ul>
                <li><a href="index.html">На сайт</a></li>
                <li><button id="logout-btn" style="background:#e94560;">Выйти</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>➕ Добавление модели</h1>
        
        <div class="form-group">
            <label>Название модели *</label>
            <input type="text" id="model-name" placeholder="Дракончик">
        </div>
        
        <div class="form-group">
            <label>Описание</label>
            <textarea id="model-desc" rows="3" placeholder="Красивая фигурка дракона..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Ссылка на фото (URL)</label>
            <input type="url" id="model-image" placeholder="https://example.com/photo.jpg">
        </div>
        
        <div class="form-group">
            <label>Цена (₽) *</label>
            <input type="number" id="model-price" placeholder="500">
        </div>
        
        <div class="form-group">
            <label>Точный вес (грамм) - опционально</label>
            <input type="number" id="model-weight" placeholder="50">
            <small>Если не указать, в каталоге будет только цена</small>
        </div>
        
        <div class="form-group">
            <label>Сложность печати (1-10) - опционально</label>
            <input type="number" id="model-complexity" placeholder="5" min="1" max="10">
        </div>
        
        <div class="form-group">
            <label>Лицензия модели *</label>
            <select id="model-license">
                <option value="CC0">CC0 (Public Domain) - можно продавать</option>
                <option value="CC BY">CC BY - можно продавать, указать автора</option>
                <option value="CC BY-SA">CC BY-SA - можно продавать, открывать изменения</option>
                <option value="CC BY-NC" disabled>CC BY-NC - НЕЛЬЗЯ продавать</option>
                <option value="Commercial License">Коммерческая лицензия (Patreon и др.)</option>
                <option value="Other">Другая (требуется проверка)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Автор модели</label>
            <input type="text" id="model-author" placeholder="Имя автора">
        </div>
        
        <div class="form-group">
            <label>Ссылка на оригинал</label>
            <input type="url" id="model-original" placeholder="https://www.thingiverse.com/thing:123456">
        </div>
        
        <div class="form-group">
            <label>Категория</label>
            <input type="text" id="model-category" placeholder="Фигурки, Органайзеры...">
        </div>
        
        <button id="add-model-btn" class="btn-primary">➕ Добавить модель</button>
        
        <h2 style="margin-top: 2rem;">📋 Существующие модели</h2>
        <div id="models-list"></div>
    </main>

    <footer>
        <p>FurtherWind - Админ панель</p>
    </footer>

    <script src="supabase-init.js"></script>
    <script>
        const ADMIN_EMAIL = 'andrey_2019_myashin@mail.ru'; // ЗАМЕНИ НА СВОЙ EMAIL
        
        async function checkAdmin() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'profile.html';
                return false;
            }
            if (session.user.email !== ADMIN_EMAIL) {
                alert('У вас нет прав администратора');
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        async function loadModelsForAdmin() {
            const { data: models } = await supabase
                .from('models')
                .select('*')
                .order('created_at', { ascending: false });
                
            const container = document.getElementById('models-list');
            if (!models || models.length === 0) {
                container.innerHTML = '<p>Моделей пока нет</p>';
                return;
            }
            
            container.innerHTML = models.map(model => `
                <div style="background:#f0f0f0; padding:1rem; margin-bottom:1rem; border-radius:5px;">
                    <strong>${model.name}</strong> - ${model.price} ₽
                    ${model.weight ? `<span style="background:#e94560; color:white; padding:2px 8px; border-radius:12px; margin-left:10px;">⚖️ ${model.weight}г</span>` : ''}
                    ${model.license ? `<span style="background:#666; color:white; padding:2px 8px; border-radius:12px; margin-left:5px;">📜 ${model.license}</span>` : ''}
                    <br>
                    <small>${model.description?.substring(0, 100)}</small><br>
                    <button onclick="deleteModel(${model.id})" style="background:#e94560; margin-top:0.5rem;">🗑️ Удалить</button>
                </div>
            `).join('');
        }
        
        window.deleteModel = async (id) => {
            if (confirm('Удалить модель?')) {
                await supabase.from('models').delete().eq('id', id);
                loadModelsForAdmin();
            }
        };
        
        document.getElementById('add-model-btn').onclick = async () => {
            const name = document.getElementById('model-name').value;
            const price = parseFloat(document.getElementById('model-price').value);
            
            if (!name || !price) {
                alert('Заполните название и цену');
                return;
            }
            
            const newModel = {
                name,
                description: document.getElementById('model-desc').value,
                image_url: document.getElementById('model-image').value || null,
                price,
                weight: document.getElementById('model-weight').value ? parseFloat(document.getElementById('model-weight').value) : null,
                complexity: document.getElementById('model-complexity').value ? parseFloat(document.getElementById('model-complexity').value) : null,
                license: document.getElementById('model-license').value,
                author: document.getElementById('model-author').value || null,
                original_url: document.getElementById('model-original').value || null,
                category: document.getElementById('model-category').value || null
            };
            
            const { error } = await supabase.from('models').insert(newModel);
            
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('✅ Модель добавлена!');
                document.getElementById('model-name').value = '';
                document.getElementById('model-desc').value = '';
                document.getElementById('model-image').value = '';
                document.getElementById('model-price').value = '';
                document.getElementById('model-weight').value = '';
                document.getElementById('model-complexity').value = '';
                document.getElementById('model-author').value = '';
                document.getElementById('model-original').value = '';
                document.getElementById('model-category').value = '';
                loadModelsForAdmin();
            }
        };
        
        document.getElementById('logout-btn').onclick = logout;
        checkAdmin().then(isAdmin => { if (isAdmin) loadModelsForAdmin(); });
    </script>
</body>
</html>
