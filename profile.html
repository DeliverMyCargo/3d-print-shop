<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - FurtherWind</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">FurtherWind</div>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="request-price.html">Запросить цену</a></li>
                <li><a href="cart.html">Корзина 🛒</a></li>
                <li id="auth-nav">
                    <a href="profile.html">Профиль</a>
                    <span id="user-email" style="display:none;"></span>
                    <button id="logout-btn" style="display:none;">Выйти</button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="auth-container">
            <div id="login-form" class="form-container">
                <h2>Вход</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="********">
                </div>
                <button id="login-btn" class="btn-primary">Войти</button>
                <p style="margin-top: 1rem;">Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a></p>
            </div>
            
            <div id="register-form" class="form-container" style="display:none;">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="********">
                </div>
                <button id="register-btn" class="btn-primary">Зарегистрироваться</button>
                <p style="margin-top: 1rem;">Уже есть аккаунт? <a href="#" id="show-login">Войти</a></p>
            </div>
            
            <div id="profile-info" style="display:none;">
                <h2>Личный кабинет</h2>
                <p><strong>Email:</strong> <span id="profile-email"></span></p>
                <p><strong>Телефон:</strong> <input type="text" id="profile-phone" placeholder="+7 XXX XXX-XX-XX"></p>
                <button id="save-profile-btn" class="btn-primary">Сохранить</button>
                <button id="view-orders-btn" class="btn-primary" style="background:#666;">Мои заказы</button>
                <div id="orders-list" style="margin-top: 2rem;"></div>
                <p style="margin-top: 2rem;">📞 По вопросам заказов: <a href="https://t.me/FurtherWind" target="_blank">Telegram @FurtherWind</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>FurtherWind - 3D печать | Контакты: <a href="https://t.me/FurtherWind" target="_blank">Telegram</a></p>
    </footer>

    <script>
        // Функции для работы с профилем
        async function loadProfileInfo() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return false;
            
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('profile-info').style.display = 'block';
            document.getElementById('profile-email').textContent = session.user.email;
            
            // Загружаем профиль
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
                
            if (profile?.phone) {
                document.getElementById('profile-phone').value = profile.phone;
            }
            
            // Загружаем заказы
            const { data: orders } = await supabase
                .from('orders')
                .select('*')
                .eq('user_id', session.user.id)
                .order('created_at', { ascending: false });
                
            const ordersContainer = document.getElementById('orders-list');
            if (orders && orders.length > 0) {
                ordersContainer.innerHTML = '<h3>Мои заказы</h3>' + orders.map(order => `
                    <div style="background:#f0f0f0; padding:1rem; margin-bottom:0.5rem; border-radius:5px;">
                        Заказ #${order.id} - ${order.total_price} ₽ - Статус: ${order.status}<br>
                        <small>${new Date(order.created_at).toLocaleDateString()}</small>
                    </div>
                `).join('');
            } else {
                ordersContainer.innerHTML = '<p>У вас пока нет заказов</p>';
            }
            
            return true;
        }
        
        // Вход
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                window.location.reload();
            }
        };
        
        // Регистрация
        document.getElementById('register-btn').onclick = async () => {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('Регистрация успешна! Проверьте почту для подтверждения');
            }
        };
        
        // Сохранение профиля
        document.getElementById('save-profile-btn').onclick = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const phone = document.getElementById('profile-phone').value;
                await supabase
                    .from('profiles')
                    .update({ phone })
                    .eq('id', session.user.id);
                alert('Профиль сохранен');
            }
        };
        
        // Переключение между формами
        document.getElementById('show-register').onclick = (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        };
        
        document.getElementById('show-login').onclick = (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        };
        
        document.getElementById('view-orders-btn').onclick = () => {
            window.location.reload();
        };
        
        // Проверяем авторизацию при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                loadProfileInfo();
            } else {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('profile-info').style.display = 'none';
            }
        });
    </script>
</body>
</html>
